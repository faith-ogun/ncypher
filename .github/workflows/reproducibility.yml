name: reproducibility

# The agentic reproducibility gate: on every push and PR, the engine unit tests run on
# a clean machine, and Claude re-checks that the headline validation claim in the README
# still holds and is internally consistent with the code (e.g. the go/no-go memo threshold
# matches the calibrated boundary, no 0.5-vs-0.162 contradiction). It turns the demo's
# "a reviewer agent verifies the number" beat into a permanent, public artifact.
#
# Requires (one-time, done by the maintainer): the Claude GitHub App installed on this repo,
# and an ANTHROPIC_API_KEY repository secret (bills API credits, not the Claude Max cap).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  tests:
    name: engine unit tests (clean machine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: system libs for pyBigWig
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: install
        run: pip install -r requirements.txt pytest
      - name: run tests
        run: PYTHONPATH=src python -m pytest tests/ -q

  claude-verify:
    name: Claude re-verifies the headline claim
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Claude Code re-verifies the headline claim
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          {
            echo "===== README.md (first 220 lines) ====="; sed -n '1,220p' README.md
            echo; echo "===== src/nc_score/converge.py ====="; cat src/nc_score/converge.py
          } > ctx.txt
          OUT=$(cat ctx.txt | claude -p "You are the NCypher reproducibility reviewer. Using the two files provided above, reply with ONE line that starts with PASS or FAIL, then one short reason. Check: (1) the README caQTL headline (AUROC about 0.69, 7.5x the base rate, context-specific) is stated consistently and not overclaimed; (2) the go/no-go memo kill-criterion in converge.py uses the calibrated chromatin_hi argument passed to converge(), NOT a hard-coded 0.5; (3) there is no claim of reverse-complement or mappability leakage guards that the code does not implement (only a GC control is implemented)." --output-format text --dangerously-skip-permissions)
          echo "$OUT"
          if echo "$OUT" | grep -qiE "\bFAIL\b"; then
            echo "::error::Claude flagged a reproducibility or consistency issue"; exit 1
          fi
          echo "Claude verification: PASS"
