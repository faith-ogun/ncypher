name: Deploy dashboard to GitHub Pages

# Publishes the NCypher React dashboard to https://faith-ogun.github.io/ncypher/
# One-time setup in the repo: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that, every push to main that touches the
# dashboard redeploys it.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
